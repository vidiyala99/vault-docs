name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-eval:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: vault
          POSTGRES_PASSWORD: vault
          POSTGRES_DB: vault
        ports:
          # Match local dev (host 5433) so conftest/eval URLs work unchanged.
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U vault -d vault"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -q

      # The eval is the regression gate: deterministic (keyless) mode is fully
      # reproducible, so any metric drop vs the committed baseline is a real
      # behavior change, not provider noise. Exits 1 on regression.
      - name: Run eval vs committed baseline
        run: uv run python -m evals.run --deterministic --compare-baseline
